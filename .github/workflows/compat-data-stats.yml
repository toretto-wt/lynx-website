name: Compat Data Stats

on:
  pull_request:
    paths:
      - 'packages/lynx-compat-data/**'

jobs:
  stats-comment:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get base branch stats
        run: |
          git show origin/${{ github.event.pull_request.base.ref }}:packages/lynx-compat-data/api-stats.json > /tmp/base-stats.json || echo '{}' > /tmp/base-stats.json

      - name: Generate PR stats
        run: pnpm --filter @lynx-js/lynx-compat-data run gen-stats

      - name: Generate comparison
        run: node packages/lynx-compat-data/scripts/compare-stats.mjs /tmp/base-stats.json packages/lynx-compat-data/api-stats.json > /tmp/comment.md

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/comment.md', 'utf8');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = '<!-- lynx-compat-data-stats -->';
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
